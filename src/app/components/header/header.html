<header>
  <div class="container">
    <a href="#home" class="logo" aria-label="Ir para o início" (click)="navigateTo($event, 'home')"
      >ortega<span class="pink">van</span></a
    >
    <button
      class="menu-toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="main-nav"
      aria-label="Abrir menu"
    >
      @if (menuOpen()) {
        <i class="fa-duotone fa-solid fa-xmark" aria-hidden="true"></i>
      } @else {
        <i class="fa-duotone fa-solid fa-bars" aria-hidden="true"></i>
      }
    </button>
    <nav id="main-nav" [class.open]="menuOpen()" aria-label="Navegação principal">
      <a href="#home" (click)="navigateTo($event, 'home')">Home</a>
      <a href="#about" (click)="navigateTo($event, 'about')">Sobre mim</a>
      <a href="#book" (click)="navigateTo($event, 'book')">Meu livro</a>
      <a href="#courses" (click)="navigateTo($event, 'courses')">Cursos</a>
      <a href="#email" (click)="navigateTo($event, 'email')">Contato</a>
    </nav>
  </div>
</header>
